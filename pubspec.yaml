name: sagali_light
description: "Bitcoin Ligtning Wallet."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  english_words: ^4.0.0
  provider: ^6.1.5
  font_awesome_flutter: ^10.7.0
  mobile_scanner: ^6.0.0
  permission_handler: ^11.3.0
  qr_flutter: ^4.1.0
  share_plus: ^7.2.1
  shared_preferences: ^2.2.2
  rxdart: ^0.28.0
  bip39: ^1.0.6
  breez_sdk_spark_flutter:
    git:
      url: https://github.com/breez/breez-sdk-spark-flutter
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.3.0
  package_info_plus: ^9.0.0
  path_provider: ^2.1.2
  currency_picker: ^2.0.21
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0  
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21